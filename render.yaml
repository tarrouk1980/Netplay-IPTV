services:
  - type: web
    name: easyway-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node backend/src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: easyway-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: easyway-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MAPBOX_TOKEN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

  - type: redis
    name: easyway-redis
    region: frankfurt
    plan: free
    ipAllowList: []

databases:
  - name: easyway-db
    databaseName: easyway_db
    user: easyway
    region: frankfurt
    plan: free
