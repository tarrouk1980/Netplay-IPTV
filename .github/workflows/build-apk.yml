name: Build Android APK (local)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Générer un APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/exciting-tesla-XtU1R

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Prebuild (generate android/ folder)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Bundle JS into APK
        working-directory: mobile
        run: |
          set -e
          mkdir -p android/app/src/main/assets
          ENTRY="node_modules/expo/AppEntry.js"
          if [ ! -f "$ENTRY" ]; then
            echo "ERROR: $ENTRY not found"
            exit 1
          fi
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file "$ENTRY" \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
          echo "=== Bundle size ==="
          ls -lh android/app/src/main/assets/index.android.bundle

      - name: Build Debug APK
        working-directory: mobile/android
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
          SKIP_BUNDLING: "true"
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tail -60

      - name: Locate APK
        run: |
          echo "=== APKs trouvés ==="
          find mobile/android/app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "Aucun APK trouvé"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easyway-debug.apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
