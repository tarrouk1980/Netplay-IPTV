name: Build Android APK (local)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Générer un APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/exciting-tesla-XtU1R

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Prebuild (generate android/ folder)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Bundle JS into APK
        working-directory: mobile
        run: |
          set -e
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false
          echo "=== Bundle size ==="
          ls -lh android/app/src/main/assets/index.android.bundle

      - name: Build Release APK (auto-signed with debug key)
        working-directory: mobile/android
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -60

      - name: Locate APK
        run: |
          echo "=== APKs trouvés ==="
          find mobile/android/app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "Aucun APK trouvé"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easyway-release.apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
